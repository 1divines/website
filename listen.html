      <section>
        <h2 class="section-title">LISTEN</h2>

              src="./assets/listen-apple.jpg"
              alt="Apple Music artwork"

            />

          </a>

          <a class="listen-image-card tracked-link" data-link-name="Spotify" href="https://open.spotify.com/artist/0yxSA9lOBPdxH7hdyP089c" target="_blank" rel="noopener noreferrer">

              src="./assets/listen-spotify.jpg"
              alt="Spotify artwork"
              onerror="this.onerror=null;this.src='./assets/divine-main.jpg';"
            />
            <span>SPOTIFY ↗</span>
          </a>

          <a class="listen-image-card tracked-link" data-link-name="SoundCloud" href="https://soundcloud.com/divinesxo" target="_blank" rel="noopener noreferrer">

              src="./assets/listen-soundcloud.jpg"
              alt="SoundCloud artwork"
              onerror="this.onerror=null;this.src='./assets/divine-main.jpg';"
            />
            <span>SOUNDCLOUD ↗</span>
